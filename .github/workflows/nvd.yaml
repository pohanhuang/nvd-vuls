name: Update NVD Feeds

permissions:
  contents: write

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      year_start:
        description: 'Start year'
        default: '2002'
      year_end:
        description: 'End year'
        default: '2026'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update NVD feeds
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          START_YEAR: ${{ github.event.inputs.year_start || '2002' }}
          END_YEAR: ${{ github.event.inputs.year_end || '2026' }}
        run: |
          scripts/update-nvd-feeds

      - name: Sign merged NVD feeds
        env:
          NVD_SIGNING_KEY: ${{ secrets.NVD_SIGNING_KEY }}
          NVD_SIGNING_KEY_PASSPHRASE: ${{ secrets.NVD_SIGNING_KEY_PASSPHRASE }}
        run: |
          scripts/sign-nvd-feeds

      - name: Commit NVD feeds
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          git add nvd-feeds/ merged_nvd_feeds.json merged_nvd_feeds.json.asc merged_nvd_feeds.json.sha256
          git commit -m "update nvd feeds $(date +%Y-%m-%d)" || echo "nothing to commit"
          git push
