name: Update NVD Feeds

permissions:
  contents: write
  id-token: write
  packages: write

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      year_start:
        description: 'Start year'
        default: '2002'
      year_end:
        description: 'End year'
        default: '2026'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: sigstore/cosign-installer@v3

      - uses: oras-project/setup-oras@v1

      - name: Log in to GHCR
        run: |
          echo "${{ github.token }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
          echo "${{ github.token }}" | cosign login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Update NVD feeds
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          START_YEAR: ${{ github.event.inputs.year_start || '2002' }}
          END_YEAR: ${{ github.event.inputs.year_end || '2026' }}
        run: |
          bash scripts/nvd

      - name: Publish merged NVD feeds
        env:
          OCI_REPOSITORY: ghcr.io/${{ github.repository }}/nvd-feeds
        run: |
          bash scripts/publish-nvd-feeds

      - name: Sign published NVD feeds
        run: |
          bash scripts/sign-nvd-feeds

      - name: Commit NVD feeds
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          git add nvd-feeds/ nvd-feeds.oci-ref
          git commit -m "update nvd feeds $(date +%Y-%m-%d)" || echo "nothing to commit"
          git push
