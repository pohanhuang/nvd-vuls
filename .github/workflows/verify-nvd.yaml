name: Verify NVD Feeds

permissions:
  contents: read

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Update NVD Feeds
    types:
      - completed
  push:
    paths:
      - "merged_nvd_feeds.json"
      - "merged_nvd_feeds.json.sigstore.json"
      - "merged_nvd_feeds.json.sha256"
      - "scripts/verify-nvd-feeds"
      - ".github/workflows/verify-nvd.yaml"

jobs:
  verify:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: sigstore/cosign-installer@v3

      - name: Verify merged NVD feeds
        env:
          CERTIFICATE_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/nvd.yaml@refs/heads/${{ github.event.repository.default_branch }}
        run: |
          scripts/verify-nvd-feeds
