name: Verify NVD Feeds

permissions:
  contents: read
  packages: read

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Update NVD Feeds
    types:
      - completed
  push:
    paths:
      - "nvd-feeds.oci-ref"
      - "scripts/verify-oci-artifact"
      - "scripts/verify-latest-oci-artifact"
      - "scripts/verify-nvd-feeds"
      - "scripts/verify-latest-nvd-feeds"
      - ".github/workflows/verify-nvd.yaml"

jobs:
  verify:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: sigstore/cosign-installer@v3

      - uses: oras-project/setup-oras@v1

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Log in to GHCR
        run: |
          echo "${{ github.token }}" | cosign login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Verify merged NVD feeds
        id: verify
        env:
          CERTIFICATE_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/nvd.yaml@refs/heads/${{ github.event.repository.default_branch }}
        run: |
          bash scripts/verify-nvd-feeds
          OCI_REF=$(cat nvd-feeds.oci-ref)
          echo "### ✅ Verification Successful" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Verified Image:** \`${OCI_REF}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::❌ Verification failed"
          echo "### ❌ Verification Failed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Please check the logs for details." >> "$GITHUB_STEP_SUMMARY"
